# Autoreload Config
set-option -g @plugin 'b0o/tmux-autoreload'

# Floating Terminal
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-bind 't'
set -g @floax-title 'terminal'
set -g @floax-text-color 'white'

run /usr/share/tmux-plugin-manager/tpm

# Terminal Styling Tweaks
set -g default-terminal 'tmux-256color'

# 1-based indexing
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Enable Mouse
set -g mouse on

# Status Bar
set -g status-position top
set -g status-style "bg=black,fg=white"
set -g status-justify "centre"
set -g status-left " #{session_name} "
set -g status-left-style "bg=green,fg=black"
set -g status-left-length 20
set -g window-status-format "[#I] #W"
set -g window-status-style "fg=white,bg=black"
set -g window-status-current-format "[#I] #W"
set -g window-status-current-style "bold,fg=yellow,bg=black"
set -g status-right "   #(gh api /notifications | jq '. | length') "
set -g status-right-style "fg=black,bg=green"

